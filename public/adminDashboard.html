<!DOCTYPE html>
<html>
<head>

<title>TalaSitio Admin</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

/* SIDEBAR */

.sidebar{
width:220px;
height:100vh;
background:#1e3a5f;
color:white;
position:fixed;
}

.sidebar h2{
text-align:center;
padding:20px;
border-bottom:1px solid rgba(255,255,255,0.2);
}

.sidebar a{
display:block;
color:white;
padding:15px;
text-decoration:none;
}

.sidebar a:hover{
background:#294a73;
}

/* MAIN */

.main{
margin-left:220px;
}

/* TOPBAR */

.topbar{
height:60px;
background:white;
display:flex;
justify-content:flex-end;
align-items:center;
padding:0 20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.profile{
display:flex;
align-items:center;
gap:10px;
}

/* CONTENT */

.content{
padding:30px;
}

.cards{
display:flex;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
width:200px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card h3{
margin:0;
color:#1e3a5f;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>TalaSitio</h2>

<a href="#">Dashboard</a>
<a href="#">Residents</a>
<a href="#">Reports</a>
<a href="#">Settings</a>

<a href="#" onclick="logout()">Logout</a>

</div>


<div class="main">

<div class="topbar">

<div class="profile">
🔔 Admin
</div>

</div>


<div class="content">

<h1>Admin Dashboard</h1>

<p>Welcome Admin</p>

<div class="cards">

<div class="card">
<h3>Residents</h3>
<p>120</p>
</div>

<div class="card">
<h3>Reports</h3>
<p>15</p>
</div>

<div class="card">
<h3>Announcements</h3>
<p>4</p>
</div>

</div>

</div>

</div>


<script>

/* CHECK LOGIN */

const token=localStorage.getItem("token");
const role=localStorage.getItem("role");

if(!token || role!=="admin"){

alert("Access denied");
window.location.href="login.html";

}

/* LOGOUT */

function logout(){

const confirmLogout=confirm("Do you want to logout?");

if(confirmLogout){

localStorage.removeItem("token");
localStorage.removeItem("role");

window.location.href="login.html";

}

}

</script>

</body>
</html>
