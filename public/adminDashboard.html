<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
margin:0;
}

.sidebar{
width:200px;
height:100vh;
background:#2c3e50;
color:white;
position:fixed;
}

.sidebar h2{
text-align:center;
padding:20px;
}

.sidebar a{
display:block;
color:white;
padding:15px;
text-decoration:none;
}

.sidebar a:hover{
background:#34495e;
}

.main{
margin-left:200px;
padding:30px;
}

button{
padding:10px;
background:red;
border:none;
color:white;
cursor:pointer;
}

/* Notification button styles */
.notification-btn {
    position: fixed;
    top: 10px;
    right: 10px;
    background: #3498db;
    color: white;
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    font-size: 20px;
    cursor: pointer;
    z-index: 1000;
}

.notification-btn:hover {
    background: #2980b9;
}

</style>

</head>

<body>

<!-- Notification button -->
<button class="notification-btn" onclick="toggleRequests()">🔔</button>

<div id="requestBox" style="
display:none;
position:fixed;
top:60px;
right:10px;
background:white;
width:300px;
max-height:400px;
overflow:auto;
box-shadow:0 0 10px rgba(0,0,0,0.2);
padding:10px;
border-radius:5px;
">

<h3>Account Requests</h3>

<div id="requestList"></div>

</div>

<div class="sidebar">

<h2>TalaSitio</h2>

<a href="#">Dashboard</a>
<a href="#">Residents</a>
<a href="#">Reports</a>

<a href="#" onclick="logout()">Logout</a>

</div>

<div class="main">

<h1>Admin Dashboard</h1>

<p>Welcome Admin</p>

</div>

<script>

const token = localStorage.getItem("token");

if(!token){
    window.location.href="login.html";
}

function logout(){

    const confirmLogout = confirm("Do you want to log out?");

    if(confirmLogout){
        localStorage.removeItem("token");
        window.location.href="login.html";
    }

}

function toggleRequests() {
    const box = document.getElementById("requestBox");
    box.style.display = box.style.display === "none" ? "block" : "none";
    if (box.style.display === "block") {
        fetchRequests();
    }
}

async function fetchRequests() {
    try {
        const response = await fetch("http://localhost:5000/account-requests", {
            headers: { "Authorization": `Bearer ${token}` }
        });
        const requests = await response.json();
        const list = document.getElementById("requestList");
        list.innerHTML = "";
        requests.forEach(req => {
            const div = document.createElement("div");
            div.innerHTML = `<p>${req.name} - ${req.email}</p><button onclick="approveRequest('${req._id}')">Approve</button>`;
            list.appendChild(div);
        });
    } catch (error) {
        console.error("Error fetching requests:", error);
    }
}

async function approveRequest(id) {
    try {
        await fetch(`http://localhost:5000/approve-request/${id}`, {
            method: "POST",
            headers: { "Authorization": `Bearer ${token}` }
        });
        fetchRequests(); // Refresh list
    } catch (error) {
        console.error("Error approving request:", error);
    }
}

</script>

</body>
</html>
