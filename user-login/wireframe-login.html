<!DOCTYPE html>
<html>
<head>
    <title>TalaSitio Login Wireframe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eee;
            margin: 0;
        }

        .header, .footer {
            background-color: #ccc;
            padding: 15px;
            text-align: center;
        }

        .card {
            width: 350px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border: 2px solid #999;
        }

        .box {
            border: 1px solid #000;
            height: 30px;
            margin-bottom: 15px;
        }

        .button {
            border: 1px solid #000;
            text-align: center;
            padding: 8px;
            margin-top: 10px;
        }

        .small-text {
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="header">
    [ LOGO ] TalaSitio  
    <br>
    Web-Based Census and Information Update System
</div>

<div class="card">
    <h3>LOG IN</h3>

    Username or Email
    <div class="box"></div>

    Password
    <div class="box"></div>

    [ ] Keep me logged in

    <div class="button">LOG IN BUTTON</div>

    <div class="small-text">
        Forgot Username? <br>
        Forgot Password? <br><br>
        Don’t have an account? Register Here
    </div>
</div>

<div class="footer">
    © 2026 TalaSitio | Sitio Community Management System
</div>

</body>
</html>
